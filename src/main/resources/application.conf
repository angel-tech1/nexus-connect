ktor {
    deployment {
        port = 8080
    }
    application {
        modules = [com.nexus.connect.ApplicationKt]
    }

    database {
        url = "${?SPRING_DATASOURCE_URL}"
        user = "${?SPRING_DATASOURCE_USERNAME}"
        password = "${?SPRING_DATASOURCE_PASSWORD}"
        driver_class = "org.postgresql.Driver"
        # Connection pool settings (HikariCP defaults)
        maximum_pool_size = ${?SPRING_DATASOURCE_MAX_POOL_SIZE}
        minimum_idle = ${?SPRING_DATASOURCE_MIN_IDLE}
    }

    jpa {
        persistence_unit_name = "nexus-connect"
        # Auto-update schema on startup; change to "validate" in production
        ddl_auto = "update"
        show_sql = false
        format_sql = true
        # Hibernate dialect is auto-detected from the JDBC driver, but can be overridden:
        // properties.hibernate.dialect = "org.hibernate.dialect.PostgreSQLDialect"
    }
}
